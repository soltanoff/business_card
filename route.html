    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
            overflow: hidden;
        }

        /* === Aurora Borealis Background === */
        .bg-aurora {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            filter: blur(40px);
        }

        .bg-aurora::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -60%;
            left: -25%;
            background: linear-gradient(180deg, transparent 0%, rgba(92, 215, 184, 0.15) 25%, rgba(92, 215, 184, 0.05) 45%, transparent 65%),
            linear-gradient(210deg, transparent 0%, rgba(120, 100, 255, 0.1) 35%, transparent 55%);
            animation: auroraWave 8s ease-in-out infinite alternate;
        }

        .bg-aurora::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -40%;
            left: -30%;
            background: linear-gradient(160deg, transparent 0%, rgba(92, 215, 184, 0.08) 30%, transparent 50%),
            linear-gradient(200deg, transparent 0%, rgba(80, 120, 255, 0.06) 40%, transparent 60%);
            animation: auroraWave2 12s ease-in-out infinite alternate;
        }

        @keyframes auroraWave {
            0% {
                transform: translateX(-10%) rotate(-3deg) scaleY(0.8);
            }
            50% {
                transform: translateX(5%) rotate(2deg) scaleY(1.2);
            }
            100% {
                transform: translateX(-5%) rotate(-1deg) scaleY(0.9);
            }
        }

        @keyframes auroraWave2 {
            0% {
                transform: translateX(5%) rotate(2deg) scaleY(1);
            }
            50% {
                transform: translateX(-8%) rotate(-2deg) scaleY(1.3);
            }
            100% {
                transform: translateX(3%) rotate(1deg) scaleY(0.85);
            }
        }

        /* === Content === */
        .route-container {
            position: relative;
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.8s ease-out both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .route-title {
            color: #555;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 2.5rem;
        }

        .route-title span {
            color: #5cd7b8;
        }

        /* === Selector === */
        .selector {
            display: flex;
            align-items: center;
            gap: 2.5rem;
        }

        .selector-divider {
            color: #333;
            font-size: 1.2rem;
            user-select: none;
        }

        .selector-item {
            text-decoration: none;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            display: block;
        }

        .selector-item:hover .selector-name {
            text-shadow: 0 0 20px rgba(92, 215, 184, 0.4);
        }

        .selector-item:hover .selector-sub {
            color: #888;
        }

        .selector-name {
            color: #5cd7b8;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            transition: text-shadow 0.3s ease;
        }

        .selector-sub {
            color: #555;
            font-size: 0.65rem;
            margin-top: 0.3rem;
            transition: color 0.3s ease;
        }

        /* === Responsive === */
        @media (max-width: 480px) {
            .selector {
                flex-direction: column;
                gap: 1.5rem;
            }

            .selector-divider {
                display: none;
            }

            .selector-name {
                font-size: 1.4rem;
            }
        }
    </style>
